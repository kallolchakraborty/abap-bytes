<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Quiz Engine — ABAP Bytes</title>
  <meta name="description" content="Interactive quiz and flashcard practice." />
  <meta name="theme-color" content="#2563EB" />
  <link rel="icon" type="image/svg+xml" href="assets/logo.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <script src="js/theme.js"></script>
  <link rel="stylesheet" href="css/tailwind.css" />
  <link rel="stylesheet" href="css/main.css" />
  <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
</head>
<body class="bg-white dark:bg-slate-900 text-slate-800 dark:text-slate-200 min-h-screen flex flex-col transition-colors duration-200" style="font-family: 'Ubuntu', sans-serif;">

  <header class="glass-nav sticky top-0 z-40 transition-colors duration-200">
    <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
      <a href="index.html" class="text-slate-700 dark:text-slate-200 hover:text-brand-500 transition-all flex items-center gap-2">
        <span class="material-symbols-outlined text-brand-500 text-[20px] animate-pulse">data_array</span>
        <span class="text-base font-semibold">ABAP Bytes</span>
      </a>
      <div class="flex items-center gap-2">
        <button class="theme-toggle-btn text-slate-400 hover:text-brand-500 transition-all" aria-label="Toggle theme">
          <span class="material-symbols-outlined text-[16px]">light_mode</span>
        </button>
        <button class="open-share-btn text-slate-400 hover:text-brand-500 transition-all" aria-label="Share this page">
          <span class="material-symbols-outlined text-[16px]">share</span>
        </button>
      </div>
    </div>
  </header>
  <main class="flex-grow px-6 py-12 max-w-6xl mx-auto w-full">
    <h1 class="text-3xl font-bold text-center text-slate-900 dark:text-white mb-4">Quiz Engine</h1>
    <p class="text-center text-slate-500 dark:text-slate-400 mb-12 max-w-2xl mx-auto">Test your knowledge with interactive quizzes and flashcards.</p>
    <div class="flex items-center justify-center">
      <div class="text-center py-16 px-8 border-2 border-dashed border-slate-200 dark:border-slate-700 rounded-xl bg-slate-50 dark:bg-slate-800/40 max-w-lg mx-auto">
        <span class="material-symbols-outlined text-5xl text-slate-300 dark:text-slate-600 mb-4">quiz</span>
        <p class="text-slate-500 dark:text-slate-400 text-lg">Quiz Engine</p>
        <p class="text-slate-400 dark:text-slate-500 text-sm mt-2">Interactive content under reconstruction.</p>
      </div>
    </div>
  </main>
  <footer class="border-t border-slate-200 dark:border-slate-800 py-8 bg-slate-100 dark:bg-slate-900/60">
    <div class="max-w-7xl mx-auto px-6 flex justify-center items-center text-sm text-slate-500 dark:text-slate-400">
      <span>Built for ABAP engineers targeting FAANG Staff+ roles</span>
    </div>
  </footer>
  <script src="js/modals.js" defer></script>
